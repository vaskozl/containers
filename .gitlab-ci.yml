include:
 - project: doudous/ci-templates
   ref: main
   file: build.yaml

#-------------------
# Templates
#-------------------

.makepkg:
  needs: []
  interruptible: true
  extends: .build_container
  stage: build
  rules:
  - if: $CI_PIPELINE_SOURCE == "schedule"
    when: never
  - if: $CI_COMMIT_BRANCH == "main"
    changes:
      - makepkg/*
      - .gitlab-ci.yml
  variables:
    DOCKER_AUTH_CONFIG: $GHCR_AUTH_CONFIG
    CONTEXT: makepkg
  before_script:
    - |
      if [ -n "$AURS" -a "$VERSION" != "pkg" ]; then
        FIRST="${AURS%%,*}"
        TAG=$(curl "https://aur.archlinux.org/rpc/?v=5&type=info&arg=$FIRST" |  sed -E 's/.*"Version":"([^"]+)".*/\1/')
      elif [ -n "$PKGS" ]; then
        FIRST="${PKGS%%,*}"
        TAG=$(pacman -S --print-format %v $FIRST | tail -n1 | sed 's/.*://')
      else
        die "Neither AURS nor PKGS was set"
      fi
    - REPO="ghcr.io/vaskozl/${FIRST}"
    - created="$(skopeo inspect docker://$REPO:$TAG | jq -r '.Created' | date -f /dev/stdin +%s || true)"
    - >
      if [ "$created" ]; then
        now=$(date -u +%s);
        days=$(((now - created) / ( 24 * 60 * 60 )));
        echo "$REPO:$TAG found and $days days old";
        if [ "$days" -lt 7 ]; then
          echo 'Setting SKIP_BUILD to true';
          SKIP_BUILD="true";
        fi
      fi
    - >
      EXTRA_BUILDKIT_ARGS="$EXTRA_BUILDKIT_ARGS --build-arg EXP_PKG=$FIRST --build-arg EXP_VER=$TAG"
    - if [ -n "$PKGS" ];then EXTRA_BUILDKIT_ARGS="$EXTRA_BUILDKIT_ARGS --build-arg PKGS=$PKGS";fi
    - if [ -n "$AURS" ];then EXTRA_BUILDKIT_ARGS="$EXTRA_BUILDKIT_ARGS --build-arg AURS=$AURS";fi

#-------------------
# Base
#-------------------

build:archlinux:
  extends: .build_container
  rules:
  - if: $CI_COMMIT_BRANCH == "main"
    changes:
      - ${CONTEXT}/*
  variables:
    REPO: ghcr.io/vaskozl/archlinux
    CONTEXT: archlinux
    DOCKER_AUTH_CONFIG: $GHCR_AUTH_CONFIG
    TAG: latest
    TAG2: rolling
  before_script:
    - EXTRA_BUILDKIT_ARGS=--build-arg="CACHE_BUST=$(date +%s)"\ --squash

#-------------------
# Pure arch packages
#-------------------

build:kubeconform:
  extends: .makepkg
  variables:
    PKGS: kubeconform,kustomize,go-yq

build:net-tools:
  extends: .makepkg
  variables:
    PKGS: net-tools,iproute2,iputils,tcpdump,traceroute,strace,lsof,atop,htop,iperf3,nmap

build:kubectl:
  extends: .makepkg
  variables:
    PKGS: kubectl

build:docker:
  extends: .makepkg
  variables:
    PKGS: docker,docker-buildx,sed,jq,skopeo

build:postfix:
  extends: .makepkg
  variables:
    PKGS: postfix

build:dovecot:
  extends: .makepkg
  variables:
    PKGS: dovecot

build:perl-libwww:
  extends: .makepkg
  variables:
    PKGS: perl-libwww

#-------------------
# AUR based packages
#-------------------

build:perl-mojolicious:
  extends: .makepkg
  variables:
    AURS: perl-mojolicious

build:sonarr-develop:
  extends: .makepkg
  variables:
    AURS: sonarr-develop

build:radarr-develop:
  extends: .makepkg
  variables:
    AURS: radarr-develop

build:readarr-develop:
  extends: .makepkg
  variables:
    AURS: readarr-develop

build:prowlarr-develop:
  extends: .makepkg
  variables:
    AURS: prowlarr-develop

build:flood-git:
  extends: .makepkg
  variables:
    AURS: flood-git

build:inspircd:
  extends: .makepkg
  variables:
