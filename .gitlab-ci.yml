include:
 - project: doudous/ci-templates
   ref: main
   file: build.yaml

.common:
  needs: []
  extends: .build_container
  stage: build
  rules:
    - changes:
      - ${CONTEXT}/*
  variables:
    REPO: ghcr.io/vaskozl/${CONTEXT}
    DOCKER_AUTH_CONFIG: $GHCR_AUTH_CONFIG
    EXTRA_BUILDKIT_ARGS: '--label "org.opencontainers.image.source=https://github.com/vaskozl/containers"'
  before_script:
    - TAG=$(head -n 1 $CONTEXT/Dockerfile | sed 's/.*://')

.pacman:
  needs: []
  extends: .build_container
  stage: build
  rules:
    - changes:
      - pacman/*
      - .gitlab-ci.yml
  variables:
    DOCKER_AUTH_CONFIG: $GHCR_AUTH_CONFIG
    CONTEXT: pacman
  before_script:
    - FIRST_PACKAGE="${PACKAGE%%,*}"
    - TAG=$(pacman -Sy --print-format %v $FIRST_PACKAGE | tail -n1 | sed 's/.*://')
    - REPO="ghcr.io/vaskozl/${FIRST_PACKAGE}"
    - EXTRA_BUILDKIT_ARGS=--build-arg="PACKAGE=$PACKAGE"

.makepkg:
  extends: .pacman
  variables:
    CONTEXT: makepkg
  before_script:
    - REPO="ghcr.io/vaskozl/${PACKAGE}"
    - TAG=$(curl "https://aur.archlinux.org/rpc/?v=5&type=info&arg=$PACKAGE" | sed -E 's/.*"Version":"([0-9\.-]+)".*/\1/')
    - EXTRA_BUILDKIT_ARGS=--build-arg="PACKAGE=$PACKAGE"

build:jellyfin:
  extends: .common
  variables:
    CONTEXT: jellyfin

build:jellyseerr:
  extends: .common
  variables:
    CONTEXT: jellyseerr

build:homer:
  extends: .common
  variables:
    CONTEXT: homer

build:qbit_manage:
  extends: .common
  variables:
    CONTEXT: qbit_manage

build:buildkit:
  extends: .common
  variables:
    CONTEXT: buildkit

build:renovate:
  extends: .common
  variables:
    CONTEXT: renovate

build:znc:
  extends: .common
  variables:
    CONTEXT: znc

build:logrotate:
  extends: .common
  variables:
    CONTEXT: logrotate

build:inspircd:
  extends: .common
  variables:
    CONTEXT: inspircd

build:archlinux:
  extends: .common
  variables:
    CONTEXT: archlinux
    TAG: latest
    TAG2: rolling
  before_script:
    - EXTRA_BUILDKIT_ARGS=--build-arg="CACHE_BUST=$(date +%s)"\ --squash

