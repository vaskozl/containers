include:
 - project: doudous/ci-templates
   ref: main
   file: build.yaml

.common:
  needs: []
  extends: .build_container
  stage: build
  rules:
    - changes:
      - ${CONTEXT}/*
  variables:
    REPO: ghcr.io/vaskozl/${CONTEXT}
    DOCKER_AUTH_CONFIG: $GHCR_AUTH_CONFIG
    EXTRA_BUILDKIT_ARGS: '--label "org.opencontainers.image.source=https://github.com/vaskozl/containers"'
  before_script:
    - TAG=$(head -n 1 $CONTEXT/Dockerfile | sed 's/.*://')

.makepkg:
  needs: []
  extends: .build_container
  stage: build
  rules:
    - changes:
      - makepkg/*
      - .gitlab-ci.yml
  variables:
    DOCKER_AUTH_CONFIG: $GHCR_AUTH_CONFIG
    CONTEXT: makepkg
  before_script:
    - |
      if [ -n "$AURS" ]; then
        FIRST="${AURS%%,*}"
        TAG=$(curl "https://aur.archlinux.org/rpc/?v=5&type=info&arg=$FIRST" | sed -E 's/.*"Version":"([0-9\.-]+)".*/\1/')
      elif [ -n "$PKGS" ]; then
        FIRST="${PKGS%%,*}"
        TAG=$(pacman -Sy --print-format %v $FIRST | tail -n1 | sed 's/.*://')
      else
        die "Neither AURS nor PKGS was set"
      fi
    - REPO="ghcr.io/vaskozl/${FIRST}"
    - if [ -n "$PKGS" ];then EXTRA_BUILDKIT_ARGS="$EXTRA_BUILDKIT_ARGS --build-arg PKGS=$PKGS";fi
    - if [ -n "$AURS" ];then EXTRA_BUILDKIT_ARGS="$EXTRA_BUILDKIT_ARGS --build-arg AURS=$AURS";fi
    - echo $EXTRA_BUILDKIT_ARGS

build:jellyfin:
  extends: .common
  variables:
    CONTEXT: jellyfin

build:jellyseerr:
  extends: .common
  variables:
    CONTEXT: jellyseerr

build:homer:
  extends: .common
  variables:
    CONTEXT: homer

build:qbit_manage:
  extends: .common
  variables:
    CONTEXT: qbit_manage

build:buildkit:
  extends: .common
  variables:
    CONTEXT: buildkit

build:renovate:
  extends: .common
  variables:
    CONTEXT: renovate

build:znc:
  extends: .common
  variables:
    CONTEXT: znc

build:logrotate:
  extends: .common
  variables:
    CONTEXT: logrotate

build:inspircd:
  extends: .common
  variables:
    CONTEXT: inspircd

build:archlinux:
  extends: .common
  variables:
    CONTEXT: archlinux
    TAG: latest
    TAG2: rolling
  before_script:
    - EXTRA_BUILDKIT_ARGS=--build-arg="CACHE_BUST=$(date +%s)"\ --squash

#-------------------
# Pure arch packages
#-------------------

build:kubeconform:
  extends: .makepkg
  variables:
    PKGS: kubeconform,kustomize,go-yq

build:net-tools:
