include:
 - project: doudous/ci-templates
   ref: main
   file: build.yaml

.common:
  needs: []
  extends: .build_container
  stage: build
  rules:
    - changes:
      - ${CONTEXT}/
      - .gitlab-ci.yml
  variables:
    REPO: ghcr.io/vaskozl/${CONTEXT}
    DOCKER_AUTH_CONFIG: $GHCR_AUTH_CONFIG
  before_script:
    - TAG=$(head -n 1 $CONTEXT/Dockerfile | sed 's/.*://')

build:lwp-simple:
  extends: .common
  variables:
    CONTEXT: lwp-simple

build:jellyfin:
  extends: .common
  variables:
    CONTEXT: jellyfin

build:homer:
  extends: .common
  variables:
    CONTEXT: homer

build:qbit_manage:
  extends: .common
  variables:
    CONTEXT: qbit_manage
