include:
 - project: doudous/ci-templates
   ref: main
   file: build.yaml

.common:
  needs: []
  extends: .build_container
  stage: build
  rules:
    - changes:
      - ${CONTEXT}/*
  variables:
    REPO: ghcr.io/vaskozl/${CONTEXT}
    DOCKER_AUTH_CONFIG: $GHCR_AUTH_CONFIG
    EXTRA_BUILDKIT_ARGS: '--label "org.opencontainers.image.source=https://github.com/vaskozl/containers"'
  before_script:
    - TAG=$(head -n 1 $CONTEXT/Dockerfile | sed 's/.*://')

build:lwp-simple:
  extends: .common
  variables:
    CONTEXT: lwp-simple

build:jellyfin:
  extends: .common
  variables:
    CONTEXT: jellyfin

build:jellyseerr:
  extends: .common
  variables:
    CONTEXT: jellyseerr

build:homer:
  extends: .common
  variables:
    CONTEXT: homer

build:qbit_manage:
  extends: .common
  variables:
    CONTEXT: qbit_manage

build:buildkit:
  extends: .common
  variables:
    CONTEXT: buildkit

build:renovate:
  extends: .common
  variables:
    CONTEXT: renovate

build:znc:
  extends: .common
  variables:
    CONTEXT: znc

build:logrotate:
  extends: .common
  variables:
    CONTEXT: logrotate

build:inspircd:
  extends: .common
  variables:
    CONTEXT: inspircd

build:manjaro:
  extends: .common
  variables:
    CONTEXT: manjaro
