include:
 - project: doudous/ci-templates
   ref: main
   file: build.yaml

.common:
  needs: []
  extends: .build_container
  stage: build
  only:
    - ${CONTEXT}
  variables:
    REPO: ghcr.io/vaskozl/${CONTEXT}
    DOCKER_AUTH_CONFIG: $GHCR_AUTH_CONFIG

build:logrotate:
  extends: .common
  variables:
    CONTEXT: logrotate

build:lwp-simple:
  extends: .common
  variables:
    CONTEXT: lwp-simple

build:jellyfin:
  extends: .common
  variables:
    CONTEXT: jellyfin
