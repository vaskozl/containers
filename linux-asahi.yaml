# yaml-language-server: $schema=https://raw.githubusercontent.com/chainguard-dev/apko/refs/heads/main/pkg/build/types/schema.json
include: wolfi-base.yaml
archs:
  - arm64
contents:
  packages:
    - linux-asahi=7.0.8_p1-r0
    - asahi-fwextract
    - asahi-scripts
    - bind-tools
    - bootc
    - bootc-baselayout
    - brightnessctl
    - btrfs-progs
    - busybox-full
    - cairo
    - chromium
    - conmon
    - conntrack-tools
    - coreutils
    - crun
    - curl
    - dbus-glib
    - dosfstools
    - e2fsprogs
    - ethtool
    - fastfetch
    - findmnt
    - font-liberation
    - font-noto
    - font-noto-cjk
    - font-noto-emoji
    - foot
    - fuzzel
    - grim
    - grype
    - htop
    - iproute2
    - kmod-libs
    - libinput
    - libseat
    - libva
    - libxkbcommon
    - linux-asahi-initramfs
    - losetup
    - lsblk
    - m1n1
    - mako
    - mesa-egl
    - netavark
    - nftables
    - niri
    - niri-bash-completion
    - nori-user
    - openssh
    - openssh-service
    - openssl
    - pango
    - pciutils
    - pixman
    - playerctl
    - podman
    - posix-libc-utils
    - sfdisk
    - shadow
    # skopeo: required by bootc at runtime via containers-image-proxy for image pulls
    - skopeo
    - slurp
    - sudo
    - swaylock
    - systemd
    - systemd-default-network
    - systemd-init
    - systemd-logind-service
    - ttf-dejavu
    - udev
    - wipefs
    - wireplumber
    - wl-clipboard
    - wolfi-base
    - xfsprogs
cmd: init
stop-signal: SIGRTMIN+3
accounts:
  run-as: root
annotations:
  containers.bootc: "1"
layering:
  strategy: origin
  budget: 96
