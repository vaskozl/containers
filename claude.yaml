# yaml-language-server: $schema=https://raw.githubusercontent.com/chainguard-dev/apko/refs/heads/main/pkg/build/types/schema.json
include: wolfi-base.yaml
environment:
  CLAUDE_CODE_ATTRIBUTION_HEADER: "0"
contents:
  packages:
    - claude=2.1.76-r0
    - apk-tools
    - apko
    - bash
    - bind-tools
    - brew
    - busybox
    - busybox-full
    - chromium
    - conntrack-tools
    - curl
    - ethtool
    - fzf
    - gh
    - git
    - glab
    - go
    - gofumpt
    - golangci-lint
    - htop
    - iftop
    - iproute2
    - kubectl
    - kubectl-default
    - melange
    - wget
entrypoint:
  command: claude
cmd: --help
