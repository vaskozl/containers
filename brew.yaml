# yaml-language-server: $schema=https://raw.githubusercontent.com/chainguard-dev/apko/refs/heads/main/pkg/build/types/schema.json
include: wolfi-base.yaml
environment:
  HOMEBREW_NO_AUTO_UPDATE: "1"
  PATH: "/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin:/home/linuxbrew/.linuxbrew/bin"
contents:
  packages:
    - brew=5.1.1-r0
    - gettext
    - apk-tools
    - apko
    - bash
    - bind-tools
    - busybox
    - busybox-full
    - chromium
    - conntrack-tools
    - curl
    - ethtool
    - fzf
    - gh
    - git
    - glab
    - go
    - gofumpt
    - golangci-lint
    - htop
    - iftop
    - iproute2
    - jq
    - kubectl
    - kubectl-default
    - melange
    - wget
    - xkbcomp
    - xkeyboard-config
    - xvfb-run
work-dir: /home/nonroot
