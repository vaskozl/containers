# yaml-language-server: $schema=https://raw.githubusercontent.com/chainguard-dev/apko/refs/heads/main/pkg/build/types/schema.json
include: bootc.yaml
contents:
  packages:
    # Graphics / GPU
    - mesa-full
    - mesa-full-egl
    - mesa-full-gbm
    - mesa-full-glx
    - mesa-full-libgallium
    - intel-media-driver
    - libva
    - linux-firmware
    - spirv-tools # remove on mesa-full bump

    # Wayland desktop utilities
    - foot
    - fuzzel
    - grim
    - mako
    - slurp
    - swaybg
    - swayidle
    - swaylock
    - wl-clipboard
    - brightnessctl
    - playerctl

    # Audio
    - wireplumber
    - sof-firmware

    # Networking
    - conntrack-tools
    - curl
    - ethtool
    - iproute2
    - iwd
    - wireless-regdb
    - nftables
    - systemd-default-network

    # SSH
    - gpg
    - openssh
    - openssh-service
    - openssl

    # Rootless containers
    - just-newuidmap-newgidmap
    - podman
    - slirp4netns

    # Shell
    - bash-completion
    - bash-default-config
    - git

    # System / diagnostics
    - fastfetch
    - fzf
    - htop
    - just
    - neovim
    - pciutils
    - lm-sensors
    - powertop-service

    # Fonts
    - font-liberation
    - font-noto
    - font-noto-cjk
    - font-noto-emoji
    - ttf-dejavu

    # Shell
    - zsh
    - zsh-autosuggestions
    - zsh-history-substring-search
    - zsh-syntax-highlighting
archs:
  - amd64
