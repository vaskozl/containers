# yaml-language-server: $schema=https://raw.githubusercontent.com/chainguard-dev/apko/refs/heads/main/pkg/build/types/schema.json
include: wolfi-base.yaml
contents:
  packages:
    - bootc=1.15.2-r1
    - bind-tools
    - binutils
    - bootc-baselayout
    - btrfs-progs
    - busybox-full
    - composefs
    - conmon
    - coreutils
    - cpio
    - crun
    - dbus
    - dbus-glib
    - dosfstools
    - e2fsprogs
    - findmnt
    - findutils
    - glib
    - iptables-nft
    - kmod-libs
    - libselinux
    - linux-lts
    - linux-lts-initramfs
    - losetup
    - lsblk
    - netavark
    - nori-user
    - ostree
    - posix-libc-utils
    - sfdisk
    - shadow
    - skopeo
    - strace
    - sudo
    - systemd
    - systemd-boot
    - systemd-init
    - systemd-logind-service
    - udev
    - util-linux-login
    - wipefs
    - wolfi-base
    - xfsprogs
    - zstd
cmd: init
stop-signal: SIGRTMIN+3
accounts:
  run-as: root
annotations:
  containers.bootc: "1"
layering:
  strategy: origin
  budget: 96
paths:
  # Wolfi ships with legacy /usr/bin/iptables
  # link it to the nft version instead
  - path: /usr/bin/iptables
    type: hardlink
    source: /usr/bin/xtables-nft-multi
  - path: /usr/bin/iptables-save
    type: hardlink
    source: /usr/bin/xtables-nft-multi
  - path: /usr/bin/iptables-restore
    type: hardlink
    source: /usr/bin/xtables-nft-multi
  - path: /usr/bin/ip6tables
    type: hardlink
    source: /usr/bin/xtables-nft-multi
  - path: /usr/bin/ip6tables-save
    type: hardlink
    source: /usr/bin/xtables-nft-multi
  - path: /usr/bin/ip6tables-restore
    type: hardlink
    source: /usr/bin/xtables-nft-multi
  # Strip POSIX ACL xattrs that bootc rejects on amd64 (Wolfi systemd quirk).
  # `hardlink` is abused here because it's the only mutator that can remove them
  - path: /var/log/journal-stub
    type: directory
    permissions: 0o755
  - path: /var/log/journal
    type: hardlink
    source: /var/log/journal-stub
    permissions: 0o755


