# yaml-language-server: $schema=https://raw.githubusercontent.com/chainguard-dev/apko/refs/heads/main/pkg/build/types/schema.json
include: wolfi-base.yaml
contents:
  packages:
    - bootc=1.15.2-r3
    - bind-tools
    - bootc-baselayout
    - btrfs-progs
    - busybox-full
    - conmon
    - coreutils
    - crun
    - dbus-glib
    - dosfstools
    - e2fsprogs
    - findmnt
    - kmod-libs
    - linux-lts
    - linux-lts-initramfs
    - losetup
    - lsblk
    - netavark
    - nori-user
    - posix-libc-utils
    - shadow
    - skopeo
    - sudo
    - systemd
    - systemd-init
    - systemd-logind-service
    - systemd-repart-rootfs-ext4
    - udev
    - wipefs
    - wolfi-base
    - xfsprogs
cmd: init
stop-signal: SIGRTMIN+3
accounts:
  run-as: root
annotations:
  containers.bootc: "1"
layering:
  strategy: origin
  budget: 128
paths:
  # Strip POSIX ACL xattrs that bootc rejects on amd64 (Wolfi systemd quirk).
  # `hardlink` is abused here because it's the only mutator that can remove them
  - path: /var/log/journal-stub
    type: directory
    permissions: 0o755
  - path: /var/log/journal
    type: hardlink
    source: /var/log/journal-stub
    permissions: 0o755
